<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=exit_to_app,person" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <form id="login-form" class="form-card">
                    <h2>Connexion</h2>

                    <div class="form-group">
                        <input type="email" id="email" required placeholder=" " autocomplete="email">
                        <label>Email</label>
                    </div>

                    <div class="form-group">
                        <input type="password" id="password" required placeholder=" " autocomplete="current-password">
                        <label>Mot de passe</label>
                    </div>

                    <button type="submit" class="btn-primary">Se connecter</button>

                    <p class="form-footer">
                        Pas de compte ? <a href="/register">Créer un compte</a>
                    </p>

                    <div id="message" class="message"></div>
                </form>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pédagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg      = document.getElementById('message');

        try {
            const res  = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password }),
                credentials: 'include'  // nécessaire pour recevoir le cookie refreshToken
            });

            const data = await res.json();

            if (res.ok) {
                // Stocke seulement l'access token (courte durée) et les infos non-sensibles
                // Le refresh token est dans un cookie httpOnly — inaccessible par JS
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/';
            } else {
                msg.textContent   = data.error || 'Erreur de connexion';
                msg.className     = 'message error';
                msg.style.display = 'block';
            }
        } catch {
            msg.textContent   = 'Impossible de contacter le serveur.';
            msg.className     = 'message error';
            msg.style.display = 'block';
        }
    });
    </script>
</body>
</html>
