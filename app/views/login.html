<!DOCTYPE html>
<html lang="fr">
<head>
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
    <form id="login-form" class="form-card">
    <h2>Connexion</h2>

    <div class="form-group">
        <input type="email" id="email" required placeholder=" ">
        <label>Email</label>
    </div>

    <div class="form-group">
        <input type="password" id="password" required placeholder=" ">
        <label>Mot de passe</label>
    </div>

    <button type="submit" class="btn-primary">Se connecter</button>

    <p class="form-footer">
        Pas de compte ? <a href="/register">Créer un compte</a>
    </p>

    <div id="message" class="message"></div>
</form>

<form id="2fa-form" class="form-card" style="display: none;">
    <h2>Vérification 2FA</h2>

    <div class="form-group">
        <input type="text" id="totp-code" placeholder=" " maxlength="6">
        <label>Code TOTP (6 chiffres)</label>
    </div>

    <div class="form-group">
        <input type="text" id="backup-code" placeholder=" ">
        <label>Ou utilisez un code de secours</label>
    </div>

    <button type="submit" class="btn-primary">Vérifier</button>

    <div id="2fa-message" class="message"></div>
</form>
</div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
        if (data.pending_2fa) {
            sessionStorage.setItem('temp_2fa_token', data.tempToken);
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('2fa-form').style.display = 'block';
        } else {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/';
        }
    } else {
        const msg = document.getElementById('message');
        msg.textContent = data.error || 'Erreur de connexion';
        msg.className = 'message error';
        msg.style.display = 'block';
    }
});

document.getElementById('2fa-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const tempToken = sessionStorage.getItem('temp_2fa_token');
    const totp = document.getElementById('totp-code').value;
    const backupCode = document.getElementById('backup-code').value;

    const res = await fetch('/api/auth/verify-totp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tempToken, totp: totp || undefined, backupCode: backupCode || undefined })
    });

    const data = await res.json();

    if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        sessionStorage.removeItem('temp_2fa_token');
        window.location.href = '/';
    } else {
        const msg = document.getElementById('2fa-message');
        msg.textContent = data.error || 'Erreur de vérification';
        msg.className = 'message error';
        msg.style.display = 'block';
    }
});
</script>
</body>
</html>
