<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Administration</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Administration</h1>
                <p class="hero-text">Gestion des utilisateurs et produits</p>
            </div>
        </section>

        <section class="admin-section">
            <div class="container">
                <h2>Liste des utilisateurs</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Adresse</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr><td colspan="5">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="admin-section">
            <div class="container">
                <h2>Ajouter un produit</h2>
                <form id="add-product-form" style="max-width: 600px; display: flex; flex-direction: column; gap: 1rem;">
                    <div>
                        <label for="product-name">Nom du produit:</label>
                        <input type="text" id="product-name" name="name" required style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div>
                        <label for="product-description">Description:</label>
                        <textarea id="product-description" name="description" required style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; min-height: 100px;"></textarea>
                    </div>
                    <div>
                        <label for="product-price">Prix (CHF):</label>
                        <input type="number" id="product-price" name="price" step="0.01" min="0" required style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div>
                        <label for="product-image">URL de l'image:</label>
                        <input type="url" id="product-image" name="image_url" style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <button type="submit" style="padding: 0.75rem; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Ajouter le produit</button>
                    <div id="form-message" style="display: none; padding: 1rem; border-radius: 4px; margin-top: 1rem;"></div>
                </form>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pédagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
        // Check authentication and admin role before allowing access
        if (!isAuthenticated() || !isAdmin()) {
            window.location.href = '/';
        }
        // Load users on page load
        async function loadUsers() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/admin/users', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('Non authentifié. Veuillez vous connecter.');
                    }
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }
                const users = await response.json();
                const tbody = document.getElementById('user-table-body');
                
                if (!users || users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">Aucun utilisateur trouvé</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                users.forEach(u => {
                    const row = document.createElement('tr');

                    const tdId = document.createElement('td');
                    tdId.textContent = u.id;

                    const tdUsername = document.createElement('td');
                    tdUsername.textContent = u.username;

                    const tdEmail = document.createElement('td');
                    tdEmail.textContent = u.email;

                    const tdRole = document.createElement('td');
                    const span = document.createElement('span');
                    span.className = `badge-${u.role}`;
                    span.textContent = u.role;
                    tdRole.appendChild(span);

                    const tdAddress = document.createElement('td');
                    tdAddress.textContent = u.address || '-';

                    row.appendChild(tdId);
                    row.appendChild(tdUsername);
                    row.appendChild(tdEmail);
                    row.appendChild(tdRole);
                    row.appendChild(tdAddress);

                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('user-table-body').innerHTML =
                    `<tr><td colspan="5">${error.message}</td></tr>`;
            }
        }

        // Handle product form submission
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('product-name').value,
                description: document.getElementById('product-description').value,
                price: parseFloat(document.getElementById('product-price').value),
                image_url: document.getElementById('product-image').value || null
            };

            const messageDiv = document.getElementById('form-message');

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/admin/products', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                messageDiv.style.display = 'block';
                
                if (response.ok) {
                    messageDiv.style.backgroundColor = '#d4edda';
                    messageDiv.style.color = '#155724';
                    messageDiv.textContent = 'Produit ajouté avec succès!';
                    document.getElementById('add-product-form').reset();
                    setTimeout(() => {
                        messageDiv.style.display = 'none';
                    }, 3000);
                } else if (response.status === 401) {
                    messageDiv.style.backgroundColor = '#f8d7da';
                    messageDiv.style.color = '#721c24';
                    messageDiv.textContent = 'Non authentifié. Veuillez vous connecter.';
                } else {
                    const error = await response.json();
                    messageDiv.style.backgroundColor = '#f8d7da';
                    messageDiv.style.color = '#721c24';
                    messageDiv.textContent = `Erreur: ${error.message || 'Impossible d\'ajouter le produit'}`;
                }
            } catch (error) {
                console.error('Error adding product:', error);
                messageDiv.style.display = 'block';
                messageDiv.style.backgroundColor = '#f8d7da';
                messageDiv.style.color = '#721c24';
                messageDiv.textContent = 'Erreur lors de l\'ajout du produit';
            }
        });

        // Load users when page loads
        window.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
