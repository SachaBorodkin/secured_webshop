<!DOCTYPE html>
<html lang="fr">
<head>
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Mon Profil</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        /* Fix for labels overlapping inputs on this specific page */
        .profile-card .form-group label {
            position: static;
            transform: none;
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
        }
        .profile-card .form-group input {
            padding: 0.8rem;
        }
        .btn-update {
            width: 100%;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Mon Profil</h1>
            </div>
        </section>

        <div class="container">
            <div class="profile-card">

                <div id="photo-container">
                    <div class="profile-photo-placeholder" id="photo-placeholder">👤</div>
                </div>

                <div id="user-info">
                    <div class="info-row"><strong>Nom :</strong> <span id="username">...</span></div>
                    <div class="info-row"><strong>Email :</strong> <span id="email">...</span></div>
                    <div class="info-row"><strong>Rôle :</strong> <span id="role">...</span></div>
                </div>

                <hr>

                <div class="message" id="status-message"></div>

                <form id="address-form">
                    <div class="form-group">
                        <label for="address">Adresse</label>
                        <input type="text" id="address" name="address" placeholder="Rue, n°, Ville, NPA">
                    </div>
                    <button type="submit" class="btn-primary btn-update">Mettre à jour l'adresse</button>
                </form>

                <hr>

                <form id="photo-form">
                    <div class="form-group">
                        <label for="photo">Changer la photo de profil</label>
                        <input type="file" id="photo" name="photo" accept="image/*">
                    </div>
                    <button type="submit" class="btn-primary btn-update">Envoyer la photo</button>
                </form>

            </div>
        </div>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
        function getAuthHeaders(contentType = 'application/json') {
            const token = localStorage.getItem('token');
            const headers = { 'Authorization': `Bearer ${token}` };
            if (contentType) headers['Content-Type'] = contentType;
            return headers;
        }

        async function loadProfile() {
            const res = await fetch('/api/profile', { headers: getAuthHeaders() });
            
            if (res.status === 401 || res.status === 403) {
                window.location.href = '/login';
                return;
            }

            const user = await res.json();
            document.getElementById('username').textContent = user.username;
            document.getElementById('email').textContent = user.email;
            document.getElementById('role').textContent = user.role;
            document.getElementById('address').value = user.address || '';

            if (user.photo_path) {
                document.getElementById('photo-container').innerHTML = 
                    `<img class="profile-photo" src="${user.photo_path}" alt="Photo de profil">`;
            }
        }

        document.getElementById('address-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const address = document.getElementById('address').value;
            const res = await fetch('/api/profile', {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({ address })
            });
            const data = await res.json();
            showMessage(res.ok ? 'success' : 'error', data.message || data.error);
            if (res.ok) loadProfile();
        });

        document.getElementById('photo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('photo').files[0];
            if (!file) return showMessage('error', 'Aucun fichier sélectionné');

            const formData = new FormData();
            formData.append('photo', file);

            const res = await fetch('/api/profile/photo', { 
                method: 'POST', 
                headers: getAuthHeaders(null),
                body: formData 
            });
            
            const data = await res.json();
            showMessage(res.ok ? 'success' : 'error', data.message || data.error);
            if (res.ok) loadProfile();
        });

        function showMessage(type, text) {
            const el = document.getElementById('status-message');
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        loadProfile();
    </script>
</body>
</html>
