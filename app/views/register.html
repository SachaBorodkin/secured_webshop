<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=exit_to_app,person" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Inscription</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Inscription</h1>

             <form id="register-form" class="form-card">
    <h2>Inscription</h2>

    <div class="form-group">
        <input type="text" id="username" required placeholder=" ">
        <label>Nom d'utilisateur</label>
    </div>

    <div class="form-group">
        <input type="email" id="reg-email" required placeholder=" ">
        <label>Email</label>
    </div>

    <div class="form-group">
        <input type="password" id="reg-password" required placeholder=" ">
        <label>Mot de passe</label>
    </div>

    <button type="submit" class="btn-primary">Créer mon compte</button>
</form>

            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Récupération des valeurs du formulaire
        const username = document.getElementById('username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        try {
            // Appel à l'API d'inscription (POST /api/auth/register)
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                alert('Compte créé avec succès ! Vous pouvez maintenant vous connecter.');
                window.location.href = '/login'; // Redirection vers la page de connexion
            } else {
                // Affichage de l'erreur (ex: email déjà utilisé)
                alert('Erreur : ' + (data.error || 'Une erreur est survenue'));
            }
        } catch (error) {
            console.error('Erreur lors de l\'inscription:', error);
            alert('Impossible de contacter le serveur.');
        }
    });
</script>
</body>
</html>
